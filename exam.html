<!DOCTYPE html>
<html>

<head>
<title>SnowPro Exam Simulator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/styles.css">

<script src="js/questionBank.js"></script>
<script src="js/examEngine.js"></script>
</head>

<body onload="startExam()">

<div class="exam-wrapper">

<header class="exam-header">
<h1>SnowPro Certification Simulator</h1>

<div class="exam-meta">
<div id="timer" class="timer"></div>
<div id="progress" class="progress"></div>
</div>
</header>

<main class="exam-container">

<div class="question-card">

<div id="question" class="question-text"></div>

<div id="options" class="options"></div>

<div id="hint" class="hint"></div>

</div>

<div class="exam-actions">

<div class="left-actions">
<button onclick="showHint()">Hint</button>
<button onclick="flagCurrent()">Flag</button>
</div>

<div class="nav-actions">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

<div class="right-actions">
<button onclick="reviewExam()">Review Flagged</button>
<button onclick="submitExam()" class="submit-btn">Submit Exam</button>
</div>

</div>

<div id="results" class="results"></div>

</main>

</div>

</body>
</html>

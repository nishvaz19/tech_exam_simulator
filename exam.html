<!DOCTYPE html>
<html>
<head>
    <title>Examination System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .btn-analytics {
            background: #64748b; /* Professional Slate Grey */
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 15px;
        }
        .btn-analytics:hover { background: #475569; }
    </style>
    <script src="js/examEngine.js"></script>
</head>
<body>
     
<div class="exam-wrapper">
    <header class="exam-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
        <h1 id="examTitle">Loading Examination...</h1>
        <div class="exam-meta">
            <div id="timer" class="timer"></div>
            <div id="progress" class="progress"></div>
        </div>
        </div>
        <button class="btn-analytics" onclick="window.location.href='analytics.html'">📊 View Analytics</button>    
    </header>

    <main class="exam-container">
        <div class="question-card">
            <div id="question" class="question-text"></div>
            <div id="options" class="options"></div>
            <div id="hint" class="hint"></div>
        </div>

        <div class="exam-actions">
            <div class="left-actions">
                <button onclick="showHint()">Hint</button>
                <button onclick="flagCurrent()">Flag</button>
            </div>
            <div class="nav-actions">
                <button onclick="prevQuestion()">Previous</button>
                <button onclick="nextQuestion()">Next</button>
            </div>
            <div class="right-actions">
                <button onclick="reviewExam()">Review Flagged</button>
                <button onclick="submitExam()" class="submit-btn">Submit Exam</button>
            </div>
        </div>
        <div id="results" class="results"></div>
    </main>
</div>

<script>
    // 1. Parse URL Parameters
    // Logic to parse URL and load JS
    const urlParams = new URLSearchParams(window.location.search);
    window.currentExamType = urlParams.get('type'); // Store globally for engine
   
    const examType = urlParams.get('type');

    // 2. Map types to your specific JS filenames
    const examMap = {
        'snowflake': { title: 'Snowflake Certification', file: 'js/questionBank_snowflake.js' },
        'databricks': { title: 'Databricks Certification', file: 'js/questionBank_databricks.js' },
        'python_pySpark': { title: 'Python/PySpark Exam', file: 'js/questionBank_python_pySpark.js' },
        'java': { title: 'Java Enterprise Exam', file: 'js/questionBank_Java.js' },
        'mondoDB': { title: 'MongoDB Certification', file: 'js/questionBank_mongoDB.js' },
        'nodejs': { title: 'Nodejs Certification', file: 'js/questionBank_Nodejs.js' },
        'react': { title: 'React Certification', file: 'js/questionBank_react.js' },
        'Azure': { title: 'Azure Pro/Arch Exam', file: 'js/questionBank_Azure.js' },
        'AWS': { title: 'AWS Pro/Arch Exam', file: 'js/questionBank_AWS.js' },
        'AI': { title: 'AI Engineering Exam', file: 'js/questionBank_AI.js' }
    };

    const config = examMap[examType];
    if (config) {
      document.getElementById('examTitle').innerText = config.title;
    
      const script = document.createElement('script');
      // Adding ?v= + timestamp forces the browser to download the newest file
      script.src = config.file + '?v=' + new Date().getTime(); 
    
      script.onload = () => {
        console.log(`${config.title} data loaded.`);
        startExam(); 
      };
      document.head.appendChild(script);
    } else {
      document.getElementById('examTitle').innerText = "Exam Not Found";
    }
</script>

</body>
</html>
